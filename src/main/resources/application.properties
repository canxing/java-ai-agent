# Java AI Agent Configuration
# This file contains default configuration values.
# Values can be overridden by environment variables or command-line arguments.

# API Configuration
apiKey=${OPENAI_API_KEY:}  # Required: Set via environment variable or command line
baseUrl=https://api.openai.com
model=gpt-3.5-turbo

# Chat Configuration
temperature=0.7
maxTokens=1000
# topP=1.0
# frequencyPenalty=0.0
# presencePenalty=0.0

# Application Configuration
maxHistorySize=10
timeoutSeconds=30
maxRetries=3
retryDelayMs=1000

# UI Configuration
colorfulOutput=true
showTimestamps=false
streamOutput=false

# History Configuration
saveHistory=true
historyFilePath=./history/

# System message (optional)
# systemMessage=You are a helpful AI assistant.

# Custom settings
# custom.setting1=value1
# custom.setting2=value2